services:
  api_1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: DIA_01
    ports:
      - "8000:80" # Maps host port 8000 to container port 80
    env_file:
      - .env
    environment:
      - PYTHONPATH=/code/app
    volumes:
      - ./src:/code/app
    restart: unless-stopped

  api_2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: DIA_02
    ports:
      - "8001:80" # Maps host port 8001 to container port 80
    env_file:
      - .env
    environment:
      - PYTHONPATH=/code/app
    volumes:
      - ./src:/code/app
    restart: unless-stopped

  api_3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: DIA_03
    ports:
      - "8002:80" # Maps host port 8002 to container port 80
    env_file:
      - .env
    environment:
      - PYTHONPATH=/code/app
    volumes:
      - ./src:/code/app
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: DIA_NGINX_LB
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_1
      - api_2
      - api_3
    restart: unless-stopped